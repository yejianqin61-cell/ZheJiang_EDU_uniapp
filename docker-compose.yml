version: "3.9"

# ============================================
# AI智能组卷 — 生产部署编排
# ============================================
#
# 启动: docker compose up -d
# 查看: docker compose ps
# 日志: docker compose logs -f backend
#
# 服务:
#   caddy    — HTTPS 反向代理 (:443 → frontend :80, /v1 → backend :3000)
#   frontend — Nginx 静态文件 (Vue3 SPA)
#   backend  — NestJS API
#   db       — PostgreSQL 15 + pgvector
#   redis    — Redis 7 (BullMQ + 短信验证码缓存)
#   export   — Python DOCX/PDF 导出
# ============================================

services:
  # ---- Caddy Reverse Proxy (Auto HTTPS) ----
  caddy:
    image: caddy:2-alpine
    container_name: ai-paper-caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      DOMAIN: ${DOMAIN:-localhost}
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

  # ---- Frontend (Nginx SPA) ----
  frontend:
    build:
      context: ./frontend-web
      dockerfile: Dockerfile
    container_name: ai-paper-frontend
    restart: unless-stopped

  # ---- PostgreSQL 15 + pgvector ----
  db:
    image: pgvector/pgvector:pg15
    container_name: ai-paper-db
    environment:
      POSTGRES_DB: ai_paper
      POSTGRES_USER: ai_paper
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ai_paper_dev}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/src/database/migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql
      - ./backend/src/database/migrations/003_web_migration.sql:/docker-entrypoint-initdb.d/003_web_migration.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_paper"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ---- Redis 7 ----
  redis:
    image: redis:7-alpine
    container_name: ai-paper-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ---- NestJS Backend ----
  backend:
    build: ./backend
    container_name: ai-paper-backend
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M
    environment:
      NODE_ENV: production
      DB_TYPE: postgres
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ai_paper
      DB_PASSWORD: ${DB_PASSWORD:-ai_paper_dev}
      DB_NAME: ai_paper
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_PHONES: ${ADMIN_PHONES:-}
      QWEN3_API_URL: ${QWEN3_API_URL}
      QWEN3_API_KEY: ${QWEN3_API_KEY}
      EMBEDDING_API_URL: ${EMBEDDING_API_URL}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY}
      ALIBABA_ACCESS_KEY_ID: ${ALIBABA_ACCESS_KEY_ID}
      ALIBABA_ACCESS_KEY_SECRET: ${ALIBABA_ACCESS_KEY_SECRET}
      SMS_SIGN_NAME: ${SMS_SIGN_NAME}
      SMS_TEMPLATE_CODE: ${SMS_TEMPLATE_CODE}
      ALIPAY_APP_ID: ${ALIPAY_APP_ID}
      ALIPAY_PRIVATE_KEY: ${ALIPAY_PRIVATE_KEY}
      ALIPAY_PUBLIC_KEY: ${ALIPAY_PUBLIC_KEY}
      ALIPAY_NOTIFY_URL: ${ALIPAY_NOTIFY_URL}
      ALIPAY_RETURN_URL: ${ALIPAY_RETURN_URL}
      COS_SECRET_ID: ${COS_SECRET_ID}
      COS_SECRET_KEY: ${COS_SECRET_KEY}
      COS_BUCKET: ${COS_BUCKET}
      COS_REGION: ${COS_REGION}
      EXPORT_SERVICE_URL: http://export:5000
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ---- Python Export Service ----
  export:
    build: ./export-service
    container_name: ai-paper-export
    ports:
      - "5000:5000"

volumes:
  pgdata:
  caddy_data:
  caddy_config:
